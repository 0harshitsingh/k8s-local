apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true" # Forces HTTP to auto-redirect to HTTPS
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - shop.local
    secretName: shop-tls-cert # Matches the secret we just created
  rules:
  - host: shop.local
    http:
      paths:
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 5000
